<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMRS Pink Enterprise</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
background:linear-gradient(135deg,#ffe6f0,#ffd6eb,#ffc2e2);
min-height:100vh;
padding:30px;
color:#4a004a;
transition:.3s;
}

.dark{
background:#2a0f1f;
color:white;
}

.container{max-width:1300px;margin:auto;}

h1{
text-align:center;
margin-bottom:25px;
color:#d63384;
}

.card{
background:white;
border-radius:18px;
padding:25px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(214,51,132,0.15);
}

.card h2{
margin-bottom:15px;
color:#c2185b;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;
}

.stat-card{
background:#fff0f6;
padding:20px;
border-radius:15px;
text-align:center;
border:1px solid #ffd1e6;
}

.stat-card h3{
color:#ff1493;
margin-top:5px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

input,select{
padding:10px;
border-radius:10px;
border:2px solid #ffd1e6;
background:#fff0f6;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#ff4da6,#ff80bf);
color:white;
font-weight:600;
}

button:hover{opacity:.85;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th{
background:#ff4da6;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #ffd1e6;
text-align:center;
}

.status-normal{color:green;font-weight:bold;}
.status-stage1{color:orange;font-weight:bold;}
.status-stage2{color:red;font-weight:bold;}

.pointer-box{
margin-top:15px;
background:#fff0f6;
padding:12px;
border-radius:12px;
border:1px dashed #ff4da6;
font-size:13px;
}

</style>
</head>
<body>

<div class="container">

<h1>🌸 SIMRS Pink Enterprise</h1>

<div style="text-align:right;margin-bottom:15px;">
<button onclick="toggleDark()">Dark Mode</button>
<button onclick="resetDB()">Reset</button>
<button onclick="exportPDF()">Export PDF</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
<div class="stat-card">
Total Pasien
<h3 id="totalPasien">0</h3>
</div>

<div class="stat-card">
Pendapatan
<h3 id="totalPendapatan">Rp 0</h3>
</div>

<div class="stat-card">
Tidak Normal
<h3 id="totalDarurat">0</h3>
</div>

<div class="stat-card">
Stage 2
<h3 id="stage2">0</h3>
</div>
</div>

<div class="card">
<h2>Input Pasien</h2>

<form id="formRS">
<div class="form-grid">

<input type="text" id="norm" placeholder="No RM" required>
<input type="text" id="nama" placeholder="Nama Pasien" required>

<select id="poli">
<option>Umum</option>
<option>Jantung</option>
<option>Anak</option>
<option>Saraf</option>
</select>

<select id="statusRawat">
<option>Rawat Jalan</option>
<option>Rawat Inap</option>
<option>IGD</option>
</select>

<input type="number" id="td" placeholder="Tensi" required>

</div>
<br>
<button type="submit">Simpan</button>
</form>

<div class="pointer-box" id="pointerBox" style="display:none;"></div>

</div>

<div class="card">
<h2>Data Pasien</h2>

<input type="text" id="searchInput" placeholder="Cari Nama / No RM">

<table>
<thead>
<tr>
<th>Nama</th>
<th>No RM</th>
<th>Poli</th>
<th>Status</th>
<th>Tensi</th>
<th>Kondisi</th>
<th>Biaya</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabelRS"></tbody>
</table>

</div>

<div class="card">
<h2>Statistik Grafik</h2>
<canvas id="barChart"></canvas>
<canvas id="pieChart" style="margin-top:30px;"></canvas>
</div>

</div>

<script>

class Pasien{
constructor(nama,norm,poli,status,td){
this.nama=nama;
this.norm=norm;
this.poli=poli;
this.status=status;
this.td=td;
this.biaya=this.hitungBiaya();
}

hitungBiaya(){
let tarif={
Umum:100000,
Jantung:250000,
Anak:150000,
Saraf:300000
};
return tarif[this.poli]||100000;
}

get kondisi(){
if(this.td>=180) return "Stage 2";
if(this.td>=140) return "Stage 1";
return "Normal";
}
}

let db=[];
let barChart,pieChart;

function save(){
localStorage.setItem("simrsPink",JSON.stringify(db));
}

function load(){
let data=localStorage.getItem("simrsPink");
if(data) db=JSON.parse(data);
}

function render(){
let keyword=searchInput.value.toLowerCase();
let filtered=db.filter(p=>
p.nama.toLowerCase().includes(keyword) ||
p.norm.toLowerCase().includes(keyword)
);

tabelRS.innerHTML="";

filtered.forEach((p,i)=>{
let statusClass=
p.kondisi==="Normal"?"status-normal":
p.kondisi==="Stage 1"?"status-stage1":
"status-stage2";

tabelRS.innerHTML+=`
<tr>
<td>${p.nama}</td>
<td>${p.norm}</td>
<td>${p.poli}</td>
<td>${p.status}</td>
<td>${p.td}</td>
<td class="${statusClass}">${p.kondisi}</td>
<td>Rp ${p.biaya.toLocaleString()}</td>
<td><button onclick="hapus(${i})">X</button></td>
</tr>
`;
});

updateDashboard();
updateCharts();
save();
}

function updateDashboard(){
totalPasien.innerText=db.length;
totalPendapatan.innerText="Rp "+db.reduce((a,b)=>a+b.biaya,0).toLocaleString();
totalDarurat.innerText=db.filter(p=>p.kondisi!=="Normal").length;
stage2.innerText=db.filter(p=>p.kondisi==="Stage 2").length;
}

function updateCharts(){
let normal=db.filter(p=>p.kondisi==="Normal").length;
let s1=db.filter(p=>p.kondisi==="Stage 1").length;
let s2=db.filter(p=>p.kondisi==="Stage 2").length;

if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();

barChart=new Chart(barChart=document.getElementById("barChart"),{
type:"bar",
data:{
labels:["Normal","Stage 1","Stage 2"],
datasets:[{
label:"Jumlah Pasien",
data:[normal,s1,s2],
backgroundColor:["#28a745","#ffc107","#dc3545"]
}]
}
});

pieChart=new Chart(pieChart=document.getElementById("pieChart"),{
type:"pie",
data:{
labels:["Normal","Stage 1","Stage 2"],
datasets:[{
data:[normal,s1,s2],
backgroundColor:["#28a745","#ffc107","#dc3545"]
}]
}
});
}

formRS.addEventListener("submit",function(e){
e.preventDefault();

if(db.some(p=>p.norm===norm.value)){
alert("No RM sudah ada!");
return;
}

let pasien=new Pasien(
nama.value,
norm.value,
poli.value,
statusRawat.value,
parseInt(td.value)
);

let ptrPasien=pasien;
db.push(ptrPasien);

pointerBox.style.display="block";
pointerBox.innerHTML=`
<strong>Pointer Simulation</strong><br>
ptrPasien → { nama: ${ptrPasien.nama}, td: ${ptrPasien.td}, kondisi: ${ptrPasien.kondisi} }
`;

render();
this.reset();
});

function hapus(i){
db.splice(i,1);
render();
}

function toggleDark(){
document.body.classList.toggle("dark");
}

function resetDB(){
if(confirm("Hapus semua data?")){
db=[];
render();
}
}

searchInput.addEventListener("keyup",render);

function exportPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Laporan SIMRS Pink Enterprise",10,10);
db.forEach((p,i)=>{
doc.text(`${i+1}. ${p.nama} - ${p.norm} - ${p.kondisi}`,10,20+(i*8));
});
doc.save("laporan_simrs.pdf");
}

load();
render();

</script>

</body>
</html>
